name: Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 + MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-dlfcn
            git

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER=gcc

      - name: Build
        run: ninja -C build

      - name: Build SFX tools
        run: |
          g++ -O3 -static -s -mwindows sfx/sfx_stub.cc -o build/sfx_stub.exe
          g++ -O3 -static -s sfx/sfx_packager.cc -o build/sfx_packager.exe -std=c++17

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-packager
          path: |
            build/bin/web_packager.exe
            build/sfx_stub.exe
            build/sfx_packager.exe
          compression-level: 9

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 + MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-dlfcn
            git

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-packager
          path: build

      - name: Build pre-built libs for dist
        run: |
          mkdir -p lib/webview/include lib/webview2/include lib/webview2/lib/x64
          git clone --depth 1 https://github.com/webview/webview.git deps/webview
          cd deps/webview
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++ \
            -DWEBVIEW_BUILD_SHARED_LIBS=OFF -DWEBVIEW_BUILD_STATIC_LIBS=ON \
            -DWEBVIEW_CLANG_FORMAT_EXE=OFF
          ninja -C build
          cp build/libwebview.a ../../lib/webview/
          cp -r core/include/* ../../lib/webview/include/
          cd ../..
          curl -L -o WebView2.zip https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.2903.40
          unzip -q WebView2.zip -d deps/webview2
          cp deps/webview2/build/native/include/WebView2.h lib/webview2/include/
          cp deps/webview2/build/native/include/WebView2EnvironmentOptions.h lib/webview2/include/
          cp deps/webview2/runtimes/win-x64/native/WebView2LoaderStatic.lib lib/webview2/lib/x64/
          rm -f WebView2.zip

      - name: Package dist directory
        run: |
          mkdir -p dist/lib
          cp -r lib/* dist/lib/
          cp build/bin/web_packager.exe dist/

      - name: Build SFX package
        run: |
          chmod +x build/sfx_stub.exe build/sfx_packager.exe
          ./build/sfx_packager.exe build/sfx_stub.exe dist WebPackager_SFX.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: WebPackager ${{ github.ref_name }}
          body: |
            WebPackager ${{ github.ref_name }}

            ### Downloads
            - WebPackager_SFX.exe — single-file self-extracting package
            - web_packager.exe — standalone executable (needs lib/ directory)

            ### Requirements
            - Windows 10/11 (x86_64)
            - WebView2 Runtime
          files: |
            WebPackager_SFX.exe
          fail_on_unmatched_files: false
